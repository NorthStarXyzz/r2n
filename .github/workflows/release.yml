name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runs_on }}
    continue-on-error: ${{ matrix.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: r2n-cli-linux-amd64
            runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: r2n-cli-bin
            output_binary: r2n-cli-bin
            optional: false
          - asset_name: supernode-linux-amd64
            runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: supernode
            output_binary: supernode
            optional: false
          - asset_name: r2n-cli-linux-x86
            runs_on: ubuntu-24.04
            target: i686-unknown-linux-gnu
            package: r2n-cli-bin
            output_binary: r2n-cli-bin
            optional: false
          - asset_name: supernode-linux-x86
            runs_on: ubuntu-24.04
            target: i686-unknown-linux-gnu
            package: supernode
            output_binary: supernode
            optional: false
          - asset_name: r2n-cli-windows-x86_64.exe
            runs_on: windows-2022
            target: x86_64-pc-windows-msvc
            package: r2n-cli-bin
            output_binary: r2n-cli-bin.exe
            optional: false
          - asset_name: supernode-windows-x86_64.exe
            runs_on: windows-2022
            target: x86_64-pc-windows-msvc
            package: supernode
            output_binary: supernode.exe
            optional: false
          - asset_name: r2n-cli-windows-x86.exe
            runs_on: windows-2022
            target: i686-pc-windows-msvc
            package: r2n-cli-bin
            output_binary: r2n-cli-bin.exe
            optional: false
          - asset_name: supernode-windows-x86.exe
            runs_on: windows-2022
            target: i686-pc-windows-msvc
            package: supernode
            output_binary: supernode.exe
            optional: false
          - asset_name: r2n-cli-windows-arm64.exe
            runs_on: windows-11-arm
            target: aarch64-pc-windows-msvc
            package: r2n-cli-bin
            output_binary: r2n-cli-bin.exe
            optional: false
          - asset_name: supernode-windows-arm64.exe
            runs_on: windows-11-arm
            target: aarch64-pc-windows-msvc
            package: supernode
            output_binary: supernode.exe
            optional: false
          - asset_name: r2n-cli-macos-x86_64
            runs_on: macos-15-intel
            target: x86_64-apple-darwin
            package: r2n-cli-bin
            output_binary: r2n-cli-bin
            optional: false
          - asset_name: supernode-macos-x86_64
            runs_on: macos-15-intel
            target: x86_64-apple-darwin
            package: supernode
            output_binary: supernode
            optional: false
          - asset_name: r2n-cli-macos-arm64
            runs_on: macos-14
            target: aarch64-apple-darwin
            package: r2n-cli-bin
            output_binary: r2n-cli-bin
            optional: false
          - asset_name: supernode-macos-arm64
            runs_on: macos-14
            target: aarch64-apple-darwin
            package: supernode
            output_binary: supernode
            optional: false
          - asset_name: r2n-cli-android-arm64
            runs_on: ubuntu-24.04
            target: aarch64-linux-android
            package: r2n-cli-bin
            output_binary: r2n-cli-bin
            android_linker: aarch64-linux-android21-clang
            optional: false
          - asset_name: r2n-cli-android-armv7
            runs_on: ubuntu-24.04
            target: armv7-linux-androideabi
            package: r2n-cli-bin
            output_binary: r2n-cli-bin
            android_linker: armv7a-linux-androideabi21-clang
            optional: false
          - asset_name: r2n-cli-android-x86
            runs_on: ubuntu-24.04
            target: i686-linux-android
            package: r2n-cli-bin
            output_binary: r2n-cli-bin
            android_linker: i686-linux-android21-clang
            optional: false
          - asset_name: r2n-cli-android-x86_64
            runs_on: ubuntu-24.04
            target: x86_64-linux-android
            package: r2n-cli-bin
            output_binary: r2n-cli-bin
            android_linker: x86_64-linux-android21-clang
            optional: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.package }}

      - name: Install Linux 32-bit toolchain
        if: runner.os == 'Linux' && startsWith(matrix.target, 'i686-unknown-linux-gnu')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Configure Android toolchain
        if: startsWith(matrix.target, 'aarch64-linux-android') || startsWith(matrix.target, 'armv7-linux-androideabi') || startsWith(matrix.target, 'i686-linux-android') || startsWith(matrix.target, 'x86_64-linux-android')
        shell: bash
        run: |
          set -euo pipefail
          NDK_ROOT="${ANDROID_NDK_ROOT:-${ANDROID_NDK_HOME:-${ANDROID_NDK_LATEST_HOME:-}}}"
          if [ -z "${NDK_ROOT}" ]; then
            echo "ANDROID_NDK_ROOT/ANDROID_NDK_HOME/ANDROID_NDK_LATEST_HOME is not set" >&2
            exit 1
          fi
          TOOLCHAIN_BIN="${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          LINKER="${TOOLCHAIN_BIN}/${{ matrix.android_linker }}"
          if [ ! -x "${LINKER}" ]; then
            echo "Android linker not found: ${LINKER}" >&2
            exit 1
          fi
          TARGET_ENV_NAME="$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')"
          {
            echo "ANDROID_NDK_ROOT=${NDK_ROOT}"
            echo "CARGO_TARGET_${TARGET_ENV_NAME}_LINKER=${LINKER}"
            echo "CARGO_TARGET_${TARGET_ENV_NAME}_AR=${TOOLCHAIN_BIN}/llvm-ar"
          } >> "${GITHUB_ENV}"

      - name: Build artifact
        run: cargo build --release -p ${{ matrix.package }} --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.output_binary }}" "dist/${{ matrix.asset_name }}"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.output_binary }}" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Flatten artifact directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -maxdepth 2 -type f -exec cp {} release-assets/ \;

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd release-assets
          mapfile -t files < <(find . -maxdepth 1 -type f | sort)
          prerelease_flag=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              ${prerelease_flag}
          fi
