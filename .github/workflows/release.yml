name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x64.tar.gz
            archive_format: tar.gz
            client_binary: r2n-cli-bin
            server_binary: supernode
            android: false
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_suffix: linux-arm64.tar.gz
            archive_format: tar.gz
            client_binary: r2n-cli-bin
            server_binary: supernode
            android: false
          - name: windows-x64
            runs_on: windows-2022
            target: x86_64-pc-windows-msvc
            archive_suffix: windows-x64.zip
            archive_format: zip
            client_binary: r2n-cli-bin.exe
            server_binary: supernode.exe
            android: false
          - name: macos-arm64
            runs_on: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-arm64.tar.gz
            archive_format: tar.gz
            client_binary: r2n-cli-bin
            server_binary: supernode
            android: false
          - name: macos-x64
            runs_on: macos-13
            target: x86_64-apple-darwin
            archive_suffix: macos-x64.tar.gz
            archive_format: tar.gz
            client_binary: r2n-cli-bin
            server_binary: supernode
            android: false
          - name: android-arm64
            runs_on: ubuntu-24.04
            target: aarch64-linux-android
            archive_suffix: android-arm64.tar.gz
            archive_format: tar.gz
            client_binary: r2n-cli-bin
            server_binary: ""
            android: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Android NDK
        if: matrix.android
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "${SDK_ROOT}" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set" >&2
            exit 1
          fi
          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="$(find "${SDK_ROOT}" -path '*/cmdline-tools/*/bin/sdkmanager' | head -n 1)"
          fi
          if [ ! -x "${SDKMANAGER}" ]; then
            echo "sdkmanager not found under ${SDK_ROOT}" >&2
            exit 1
          fi
          yes | "${SDKMANAGER}" --install "ndk;27.2.12479018"
          NDK_ROOT="${SDK_ROOT}/ndk/27.2.12479018"
          {
            echo "ANDROID_NDK_ROOT=${NDK_ROOT}"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          } >> "${GITHUB_ENV}"

      - name: Build desktop/server artifacts
        if: ${{ !matrix.android }}
        run: cargo build --release -p r2n-cli-bin -p supernode --target ${{ matrix.target }}

      - name: Build Android artifacts
        if: matrix.android
        run: cargo build --release -p r2n-cli-bin --target ${{ matrix.target }}

      - name: Package unix artifacts
        if: ${{ !matrix.android && matrix.archive_format == 'tar.gz' }}
        shell: bash
        run: |
          set -euo pipefail
          PKG_DIR="dist/${{ matrix.name }}"
          mkdir -p "${PKG_DIR}"
          cp "target/${{ matrix.target }}/release/${{ matrix.client_binary }}" "${PKG_DIR}/r2n-cli"
          cp "target/${{ matrix.target }}/release/${{ matrix.server_binary }}" "${PKG_DIR}/supernode"
          tar -C dist -czf "dist/r2n-${GITHUB_REF_NAME}-${{ matrix.archive_suffix }}" "${{ matrix.name }}"

      - name: Package Windows artifacts
        if: ${{ !matrix.android && matrix.archive_format == 'zip' }}
        shell: pwsh
        run: |
          $pkgDir = "dist/${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.client_binary }}" "$pkgDir/r2n-cli.exe"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.server_binary }}" "$pkgDir/supernode.exe"
          Compress-Archive -Path "$pkgDir/*" -DestinationPath "dist/r2n-${env:GITHUB_REF_NAME}-${{ matrix.archive_suffix }}" -Force

      - name: Package Android artifacts
        if: matrix.android
        shell: bash
        run: |
          set -euo pipefail
          PKG_DIR="dist/${{ matrix.name }}"
          mkdir -p "${PKG_DIR}"
          cp "target/${{ matrix.target }}/release/r2n-cli-bin" "${PKG_DIR}/r2n-cli-android-arm64"
          tar -C dist -czf "dist/r2n-${GITHUB_REF_NAME}-${{ matrix.archive_suffix }}" "${{ matrix.name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/r2n-${{ github.ref_name }}-${{ matrix.archive_suffix }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -maxdepth 2 -type f -exec cp {} release-assets/ \;

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd release-assets
          mapfile -t files < <(find . -maxdepth 1 -type f | sort)
          prerelease_flag=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              ${prerelease_flag}
          fi
